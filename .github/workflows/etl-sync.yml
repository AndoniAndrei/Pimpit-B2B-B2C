name: Pimpit ETL Sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync-products:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pimpit-etl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "WHEELTRADE_API_KEY=${{ secrets.WHEELTRADE_API_KEY }}" >> .env
          echo "FELGEO_TOKEN=${{ secrets.FELGEO_TOKEN }}" >> .env
          echo "ABS_WHEELS_API_KEY=${{ secrets.ABS_WHEELS_API_KEY }}" >> .env
          echo "STATUSFALGAR_CUSTOMER_ID=${{ secrets.STATUSFALGAR_CUSTOMER_ID }}" >> .env
          echo "STATUSFALGAR_TOKEN=${{ secrets.STATUSFALGAR_TOKEN }}" >> .env

      - name: Verify Secrets
        run: |
          if grep -q "^SUPABASE_URL=$" .env; then
            echo "❌ EROARE: SUPABASE_URL este gol! GitHub nu a putut citi secretul."
            exit 1
          else
            echo "✅ SUPABASE_URL a fost citit cu succes."
          fi
          
          if grep -q "^SUPABASE_SERVICE_ROLE_KEY=$" .env; then
            echo "❌ EROARE: SUPABASE_SERVICE_ROLE_KEY este gol!"
            exit 1
          else
            echo "✅ SUPABASE_SERVICE_ROLE_KEY a fost citit cu succes."
          fi

      - name: Run ETL Sync
        run: |
          export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          export WHEELTRADE_API_KEY="${{ secrets.WHEELTRADE_API_KEY }}"
          export FELGEO_TOKEN="${{ secrets.FELGEO_TOKEN }}"
          export ABS_WHEELS_API_KEY="${{ secrets.ABS_WHEELS_API_KEY }}"
          export STATUSFALGAR_CUSTOMER_ID="${{ secrets.STATUSFALGAR_CUSTOMER_ID }}"
          export STATUSFALGAR_TOKEN="${{ secrets.STATUSFALGAR_TOKEN }}"
          npm run sync
