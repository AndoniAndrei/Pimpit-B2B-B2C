name: Pimpit ETL Sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync-products:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pimpit-etl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify required secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ SUPABASE_URL is not set in GitHub Secrets"
            missing=1
          else
            echo "✅ SUPABASE_URL is set"
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY is not set in GitHub Secrets"
            missing=1
          else
            echo "✅ SUPABASE_SERVICE_ROLE_KEY is set"
          fi
          if [ $missing -eq 1 ]; then
            echo ""
            echo "Go to: GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Install dependencies
        run: npm install

      - name: Run ETL Sync
        run: npm run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WHEELTRADE_API_KEY: ${{ secrets.WHEELTRADE_API_KEY }}
          FELGEO_TOKEN: ${{ secrets.FELGEO_TOKEN }}
          ABS_WHEELS_API_KEY: ${{ secrets.ABS_WHEELS_API_KEY }}
          STATUSFALGAR_CUSTOMER_ID: ${{ secrets.STATUSFALGAR_CUSTOMER_ID }}
          STATUSFALGAR_TOKEN: ${{ secrets.STATUSFALGAR_TOKEN }}
